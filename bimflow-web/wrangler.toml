# Cloudflare Pages config for BIMFlow.
# Static site is in /public ; serverless API is in /functions (auto-routed to /api/*).
name = "bimatika-bimplan"
pages_build_output_dir = "public"
compatibility_date = "2024-12-01"

# KV namespace that stores plans + pending updates.
# Replace `id` with the value printed by:  npx wrangler kv namespace create BIMFLOW
[[kv_namespaces]]
binding = "BIMFLOW"
id = "eebb67373d364abe97b380d834713f47"
